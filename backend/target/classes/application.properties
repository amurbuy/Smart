# ===================================================
# SmartLivestock - Application Properties
# ===================================================

# Server
server.port=8080

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5433/smartlivestock
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=SmartLivestockSuperSecretKey2024XYZ_ChangeThisInProduction!
jwt.expiration=86400000

# Logging
logging.level.com.smartlivestock=DEBUG
logging.level.org.hibernate.SQL=DEBUG
